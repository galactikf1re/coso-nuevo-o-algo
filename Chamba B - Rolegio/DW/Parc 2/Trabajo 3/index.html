<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Producto</title>
</head>
<body>
    <form id="productForm">
        <input type="text" id="productName" placeholder="Nombre" required>
        <input type="number" id="productPrice" placeholder="Precio" step="0.01" required>
        <textarea id="productDescription" placeholder="Descripción"></textarea>
        <input type="file" id="productImage" accept="image/*" required>
        <button type="submit">Enviar</button>
    </form>

    <ul id="productList" style="margin-top:1rem; padding-left:1rem;"></ul>

    <script src="script.js"></script>
</body>
</html>
